{% extends 'base.html' %}

{% block title %}Удалить привычку{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h2 class="h5 mb-0"><i class="fas fa-trash me-2"></i>Удалить привычку</h2>
            </div>
            
            <div class="card-body">
                <p class="lead">Вы уверены, что хотите удалить эту привычку?</p>
                
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">{{ habit.action }}</h5>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item px-0">
                                <i class="fas fa-map-marker-alt me-2 text-muted"></i>
                                {{ habit.place }}
                            </li>
                            <li class="list-group-item px-0">
                                <i class="fas fa-clock me-2 text-muted"></i>
                                {{ habit.time }}
                            </li>
                        </ul>
                    </div>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-flex">
                        <button type="submit" class="btn btn-danger me-md-2">
                            <i class="fas fa-check me-1"></i> Да, удалить
                        </button>
                        <a href="{% url 'habit_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
